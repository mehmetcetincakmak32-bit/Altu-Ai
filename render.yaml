databases:
  - name: altu-postgres
    plan: free
    databaseName: altuai
    user: altuai

services:
  - type: web
    name: altu-nextjs
    runtime: node
    repo: https://github.com/mehmetcetincakmak32-bit/Altu-Ai
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npx prisma db seed && npx next start -H 0.0.0.0
    healthCheckPath: /
    envVars:
      - key: JWT_SECRET
        value: apilex-thos-gizli-anahtar-2026
      - key: DATABASE_URL
        fromDatabase:
          name: altu-postgres
          property: connectionString
      - key: NEXT_PUBLIC_PYTHON_URL
        value: ""
      - key: PYTHON_BACKEND_URL
        value: https://altu-python.onrender.com

  - type: web
    name: altu-python
    runtime: python
    repo: https://github.com/mehmetcetincakmak32-bit/Altu-Ai
    rootDir: python-backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: GOOGLE_CX
        sync: false
      - key: GOOGLE_SEARCH_KEY
        sync: false
